# k8s/monitoring/servicemonitor-cisco-api.yaml
#
# Tells Prometheus to scrape /metrics on the cisco-api Service.
# Apply this in BOTH namespaces (uat and prod) — it's namespaced
# the same way your other manifests are, via `-n` at apply time.

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cisco-api-monitor
  labels:
    release: prometheus   # must match the Helm release name (see install command below)
spec:
  selector:
    matchLabels:
      app: cisco-api       # must match the labels on your cisco-api Service
  endpoints:
    - port: http           # must match the named port on your cisco-api Service (see note below)
      path: /metrics
      interval: 15s