apiVersion: apps/v1
kind: Deployment
metadata:
  name: cisco-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cisco-frontend
  template:
    metadata:
      labels:
        app: cisco-frontend
    spec: 
      imagePullSecrets:
        - name: ghcr-secret  
      containers:
        - name: cisco-frontend
          image: ghcr.io/kushalpendhare/cisco-frontend:BUILD_NUMBER
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10