apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ciscotechnologies
data:
  nginx.conf: |
    server {
        listen 80;
        server_name ciscotechnologies.com www.ciscotechnologies.com;

        location /api/ {
            proxy_pass http://cisco-api-service:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://cisco-frontend-service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }

    server {
        listen 80;
        server_name admin.ciscotechnologies.com;

        location /api/ {
            proxy_pass http://cisco-api-service:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://cisco-frontend-service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }