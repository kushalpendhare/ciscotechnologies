---
- name: Deploy CiscoTechnologies to Kubernetes
  hosts: all
  become: false

  tasks:

    - name: Create namespace
      shell: |
        kubectl apply -f /opt/ciscotechnologies/k8s/namespace/namespace.yaml
      ignore_errors: yes

    - name: Apply ConfigMaps
      shell: |
        kubectl apply -f /opt/ciscotechnologies/k8s/config/configmap.yaml
        kubectl apply -f /opt/ciscotechnologies/k8s/postgres/init-configmap.yaml
        kubectl apply -f /opt/ciscotechnologies/k8s/nginx/configmap.yaml

    - name: Apply Secrets
      shell: |
        kubectl apply -f /opt/ciscotechnologies/k8s/config/secret.yaml

    - name: Deploy PostgreSQL
      shell: |
        kubectl apply -f /opt/ciscotechnologies/k8s/postgres/pvc.yaml
        kubectl apply -f /opt/ciscotechnologies/k8s/postgres/deployment.yaml
        kubectl apply -f /opt/ciscotechnologies/k8s/postgres/service.yaml

    - name: Wait for PostgreSQL to be ready
      shell: |
        kubectl rollout status deployment/cisco-postgres \
          -n ciscotechnologies --timeout=120s

    - name: Deploy API
      shell: |
        kubectl apply -f /opt/ciscotechnologies/k8s/api/deployment.yaml
        kubectl apply -f /opt/ciscotechnologies/k8s/api/service.yaml

    - name: Deploy Frontend
      shell: |
        kubectl apply -f /opt/ciscotechnologies/k8s/frontend/deployment.yaml
        kubectl apply -f /opt/ciscotechnologies/k8s/frontend/service.yaml

    - name: Deploy Nginx
      shell: |
        kubectl apply -f /opt/ciscotechnologies/k8s/nginx/deployment.yaml
        kubectl apply -f /opt/ciscotechnologies/k8s/nginx/service.yaml

    - name: Deploy Cloudflare Tunnel
      shell: |
        kubectl apply -f /opt/ciscotechnologies/k8s/tunnel/deployment.yaml

    - name: Verify all pods running
      shell: |
        kubectl get pods -n ciscotechnologies
      register: pod_status

    - name: Print pod status
      debug:
        var: pod_status.stdout_lines