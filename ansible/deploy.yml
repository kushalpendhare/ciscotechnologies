---
- name: Deploy CiscoTechnologies to Kubernetes
  hosts: all
  become: false
  vars:
    namespace: "{{ target_namespace | default('ciscotechnologies-uat') }}"

  tasks:

    - name: Show deployment info
      debug:
        msg: "Deploying build {{ image_tag }} to {{ namespace }}"

    - name: Apply namespace
      shell: |
        kubectl apply -f /tmp/cisco-k8s/k8s/uat/namespace.yaml
      when: namespace == "ciscotechnologies-uat"

    - name: Apply ConfigMap
      shell: |
        kubectl apply -f /tmp/cisco-k8s/k8s/config/configmap.yaml \
          -n {{ namespace }}

    - name: Apply Nginx ConfigMap
      shell: |
        kubectl apply -f /tmp/cisco-k8s/k8s/nginx/configmap.yaml \
          -n {{ namespace }}

    - name: Apply Postgres init ConfigMap
      shell: |
        kubectl apply -f /tmp/cisco-k8s/k8s/postgres/init-configmap.yaml \
          -n {{ namespace }}

    - name: Deploy PostgreSQL
      shell: |
        kubectl apply -f /tmp/cisco-k8s/k8s/postgres/pvc.yaml \
          -n {{ namespace }}
        kubectl apply -f /tmp/cisco-k8s/k8s/postgres/deployment.yaml \
          -n {{ namespace }}
        kubectl apply -f /tmp/cisco-k8s/k8s/postgres/service.yaml \
          -n {{ namespace }}

    - name: Wait for PostgreSQL
      shell: |
        kubectl rollout status deployment/cisco-postgres \
          -n {{ namespace }} --timeout=120s

    - name: Deploy API
      shell: |
        kubectl apply -f /tmp/cisco-k8s/k8s/api/deployment.yaml \
          -n {{ namespace }}
        kubectl apply -f /tmp/cisco-k8s/k8s/api/service.yaml \
          -n {{ namespace }}

    - name: Deploy Frontend
      shell: |
        kubectl apply -f /tmp/cisco-k8s/k8s/frontend/deployment.yaml \
          -n {{ namespace }}
        kubectl apply -f /tmp/cisco-k8s/k8s/frontend/service.yaml \
          -n {{ namespace }}

    - name: Deploy Nginx
      shell: |
        kubectl apply -f /tmp/cisco-k8s/k8s/nginx/deployment.yaml \
          -n {{ namespace }}
        kubectl apply -f /tmp/cisco-k8s/k8s/nginx/service.yaml \
          -n {{ namespace }}

    - name: Deploy Cloudflare Tunnel
      shell: |
        kubectl apply -f /tmp/cisco-k8s/k8s/tunnel/deployment.yaml \
          -n {{ namespace }}

    - name: Rollout restart
      shell: |
        kubectl rollout restart deployment/cisco-api \
          -n {{ namespace }}
        kubectl rollout restart deployment/cisco-frontend \
          -n {{ namespace }}
        kubectl rollout restart deployment/cisco-nginx \
          -n {{ namespace }}

    - name: Wait for rollout
      shell: |
        kubectl rollout status deployment/cisco-api \
          -n {{ namespace }} --timeout=180s
        kubectl rollout status deployment/cisco-frontend \
          -n {{ namespace }} --timeout=180s

    - name: Get pod status
      shell: kubectl get pods -n {{ namespace }}
      register: pods

    - name: Print pods
      debug:
        var: pods.stdout_lines