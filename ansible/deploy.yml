- name: Deploy CiscoTechnologies to Kubernetes
  hosts: k8s_master
  become: false

  tasks:
    - name: Pull latest code on K8s master
      shell: |
        cd /opt/ciscotechnologies/ciscotechnologies &&
        git pull origin main

    - name: Apply all K8s manifests
      shell: |
        cd /opt/ciscotechnologies/ciscotechnologies &&
        kubectl apply -f k8s/namespace/namespace.yaml &&
        kubectl apply -f k8s/config/configmap.yaml &&
        kubectl apply -f k8s/config/secret.yaml &&
        kubectl apply -f k8s/postgres/init-configmap.yaml &&
        kubectl apply -f k8s/postgres/pvc.yaml &&
        kubectl apply -f k8s/postgres/deployment.yaml &&
        kubectl apply -f k8s/postgres/service.yaml &&
        kubectl apply -f k8s/api/deployment.yaml &&
        kubectl apply -f k8s/api/service.yaml &&
        kubectl apply -f k8s/frontend/deployment.yaml &&
        kubectl apply -f k8s/frontend/service.yaml &&
        kubectl apply -f k8s/nginx/configmap.yaml &&
        kubectl apply -f k8s/nginx/deployment.yaml &&
        kubectl apply -f k8s/nginx/service.yaml &&
        kubectl apply -f k8s/tunnel/deployment.yaml

    - name: Wait for rollout
      shell: |
        kubectl rollout status deployment/cisco-api \
          -n ciscotechnologies --timeout=120s
        kubectl rollout status deployment/cisco-frontend \
          -n ciscotechnologies --timeout=120s

    - name: Get pod status
      shell: kubectl get pods -n ciscotechnologies
      register: pods

    - name: Print pods
      debug:
        var: pods.stdout_lines