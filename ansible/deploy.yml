---
- name: Deploy CiscoTechnologies to Kubernetes
  hosts: all
  become: false

  tasks:
    - name: Pull latest code on K8s master
      shell: |
        cd /opt/ciscotechnologies/ciscotechnologies &&
        git pull origin main

    - name: Apply namespace
      shell: kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/namespace/namespace.yaml

    - name: Apply configs
      shell: |
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/config/configmap.yaml
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/config/secret.yaml
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/postgres/init-configmap.yaml
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/nginx/configmap.yaml

    - name: Deploy PostgreSQL
      shell: |
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/postgres/pvc.yaml
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/postgres/deployment.yaml
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/postgres/service.yaml

    - name: Wait for PostgreSQL
      shell: kubectl rollout status deployment/cisco-postgres -n ciscotechnologies --timeout=120s

    - name: Deploy API
      shell: |
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/api/deployment.yaml
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/api/service.yaml

    - name: Deploy Frontend
      shell: |
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/frontend/deployment.yaml
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/frontend/service.yaml

    - name: Deploy Nginx
      shell: |
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/nginx/deployment.yaml
        kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/nginx/service.yaml

    - name: Deploy Tunnel
      shell: kubectl apply -f /opt/ciscotechnologies/ciscotechnologies/k8s/tunnel/deployment.yaml

    - name: Get pod status
      shell: kubectl get pods -n ciscotechnologies
      register: pods

    - name: Print pods
      debug:
        var: pods.stdout_lines