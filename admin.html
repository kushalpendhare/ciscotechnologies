<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAC Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .header { background: #1a1a1a; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;}
        .refresh-btn { background: #049fd9; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .refresh-btn:hover { background: #007bb5; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; }
        th { background: #049fd9; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f1f8fc; }
        .critical { color: red; font-weight: bold; }
    </style>
</head>
<body onload="loadTickets()">

    <div class="header">
        <h2>🛠️ Internal TAC Portal (Global Queue)</h2>
        <button class="refresh-btn" onclick="loadTickets()">↻ Refresh Data</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Ticket ID</th>
                <th>Severity</th>
                <th>Requester</th>
                <th>Category</th>
                <th>Description</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody id="ticketTableBody">
            <tr><td colspan="6" style="text-align: center;">Loading tickets from database...</td></tr>
        </tbody>
    </table>

    <script>
        async function loadTickets() {
            try {
                const response = await fetch(`http://${window.location.hostname}:5000/api/tickets`);
                const tickets = await response.json();
                
                const tableBody = document.getElementById('ticketTableBody');
                tableBody.innerHTML = ''; 
                
                tickets.forEach(ticket => {
                    const isCritical = ticket.severity.includes('P1') || ticket.severity.includes('P2');
                    const severityClass = isCritical ? 'critical' : '';
                    
                    const row = `<tr>
                        <td><strong>#${ticket.id}</strong></td>
                        <td class="${severityClass}">${ticket.severity}</td>
                        <td>${ticket.requester}<br><small>${ticket.email}</small></td>
                        <td>${ticket.category}</td>
                        <td>${ticket.description}</td>
                        <td>${new Date(ticket.timestamp).toLocaleString()}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error loading tickets:", error);
                document.getElementById('ticketTableBody').innerHTML = `<tr><td colspan="6" style="color: red; text-align: center;">Connection to API failed.</td></tr>`;
            }
        }
    </script>
</body>
</html>
