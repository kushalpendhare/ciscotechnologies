version: '3.8'

services:

  # ------------------------------------
  # 1. Database — PostgreSQL 15
  # ------------------------------------
  db:
    image: postgres:15-alpine
    container_name: cisco-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - cisco-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------
  # 2. API — Python Flask
  # ------------------------------------
  api:
    build: ./api
    container_name: cisco-api
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: db
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cisco-net

  # ------------------------------------
  # 3. Frontend — React + Vite (Nginx)
  # ------------------------------------
  frontend:
    build: ./frontend
    container_name: cisco-frontend
    restart: always
    networks:
      - cisco-net

  # ------------------------------------
  # 4. Reverse Proxy — Nginx
  # ------------------------------------
  web:
    image: nginx:alpine
    container_name: cisco-web
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - cisco-net

  # ------------------------------------
  # 5. pgAdmin — Free DB GUI
  # ------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cisco-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ciscotechnologies.com
      PGADMIN_DEFAULT_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "5050:80"
    networks:
      - cisco-net

  # ------------------------------------
  # 6. Cloudflare Tunnel
  # ------------------------------------
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cisco-tunnel
    restart: always
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate --protocol http2 run
    depends_on:
      - web
    networks:
      - cisco-net

# ------------------------------------
# Volumes & Networks
# ------------------------------------
volumes:
  pgdata:

networks:
  cisco-net:
    driver: bridge